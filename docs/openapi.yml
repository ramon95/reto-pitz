openapi: 3.0.3

info:
  title: Pitz Products API
  description: REST API for product management with soft deletes, pagination, search, and status filtering.
  version: 1.0.0
  contact:
    name: Ramon Perez
    email: ramon.a.p.r.95@gmail.com

servers:
  - url: http://localhost:3001/api/v1
    description: Local development

tags:
  - name: Products
    description: Product CRUD operations

paths:
  /products:
    get:
      tags: [Products]
      summary: List products
      description: Returns a paginated list of non-deleted products. Supports search by name and filtering by status.
      parameters:
        - name: page
          in: query
          description: Page number (default 1)
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: per_page
          in: query
          description: Items per page (default 10, max 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          example: 10
        - name: search
          in: query
          description: Case-insensitive search by product name
          schema:
            type: string
          example: laptop
        - name: status
          in: query
          description: Filter by product status
          schema:
            type: string
            enum: [active, inactive]
          example: active
      responses:
        "200":
          description: Paginated list of products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductsResponse"
              example:
                products:
                  - id: 1
                    name: Laptop Pro
                    description: High-performance laptop
                    price: "999.99"
                    stock: 10
                    sku: LAP001
                    active: true
                    discarded_at: null
                    created_at: "2026-03-07T14:00:00.000Z"
                    updated_at: "2026-03-07T14:00:00.000Z"
                pagination:
                  current_page: 1
                  per_page: 10
                  total_count: 1
                  total_pages: 1
                  next_page: null
                  prev_page: null

    post:
      tags: [Products]
      summary: Create product
      description: Creates a new product. SKU must be unique among non-deleted products.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
            example:
              product:
                name: Laptop Pro
                description: High-performance laptop
                price: 999.99
                stock: 10
                sku: LAP001
                active: true
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "422":
          description: Validation errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrors"
              example:
                errors:
                  name: ["is too short (minimum is 3 characters)"]
                  sku: ["has already been taken"]
        "400":
          description: Missing product parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "param is missing or the value is empty: product"

  /products/{id}:
    get:
      tags: [Products]
      summary: Get product
      description: Returns a single non-deleted product by ID.
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Products]
      summary: Update product
      description: Updates an existing non-deleted product. Only send the fields you want to change.
      parameters:
        - $ref: "#/components/parameters/ProductId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
            example:
              product:
                price: 849.99
                stock: 5
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "422":
          description: Validation errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrors"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Products]
      summary: Soft delete product
      description: |
        Soft-deletes a product by setting `discarded_at` to the current timestamp.
        The record is not removed from the database and can be restored later.
        The product disappears from all listing endpoints immediately.
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "204":
          description: Product deleted (no content)
        "404":
          $ref: "#/components/responses/NotFound"

  /products/{id}/restore:
    put:
      tags: [Products]
      summary: Restore deleted product
      description: |
        Restores a soft-deleted product by clearing `discarded_at`.
        Returns `422` if the product has not been deleted.
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: Product restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "422":
          description: Product is not deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Product is not deleted"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    ProductId:
      name: id
      in: path
      required: true
      description: Product ID
      schema:
        type: integer
      example: 1

  responses:
    NotFound:
      description: Product not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "Record not found"

  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        name:
          type: string
          minLength: 3
          maxLength: 100
          example: Laptop Pro
        description:
          type: string
          maxLength: 1000
          nullable: true
          example: High-performance laptop for developers
        price:
          type: string
          description: Decimal value serialized as string
          example: "999.99"
        stock:
          type: integer
          minimum: 0
          example: 10
        sku:
          type: string
          pattern: "^[A-Z0-9]+$"
          description: Uppercase letters and numbers only. Unique among non-deleted products.
          example: LAP001
        active:
          type: boolean
          default: true
          example: true
        discarded_at:
          type: string
          format: date-time
          nullable: true
          description: "null means the product is visible. A timestamp means it has been soft-deleted."
          example: null
        created_at:
          type: string
          format: date-time
          readOnly: true
          example: "2026-03-07T14:00:00.000Z"
        updated_at:
          type: string
          format: date-time
          readOnly: true
          example: "2026-03-07T14:00:00.000Z"

    ProductInput:
      type: object
      required: [product]
      properties:
        product:
          type: object
          required: [name, price, stock, sku]
          properties:
            name:
              type: string
              minLength: 3
              maxLength: 100
              example: Laptop Pro
            description:
              type: string
              maxLength: 1000
              example: High-performance laptop for developers
            price:
              type: number
              format: float
              minimum: 0.01
              example: 999.99
            stock:
              type: integer
              minimum: 0
              example: 10
            sku:
              type: string
              pattern: "^[A-Z0-9]+$"
              example: LAP001
            active:
              type: boolean
              default: true
              example: true

    Pagination:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 10
        total_count:
          type: integer
          example: 15
        total_pages:
          type: integer
          example: 2
        next_page:
          type: integer
          nullable: true
          example: 2
        prev_page:
          type: integer
          nullable: true
          example: null

    ProductsResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        pagination:
          $ref: "#/components/schemas/Pagination"

    Error:
      type: object
      properties:
        error:
          type: string
          example: Record not found

    ValidationErrors:
      type: object
      properties:
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            name: ["is too short (minimum is 3 characters)"]
            sku: ["has already been taken", "is invalid"]
